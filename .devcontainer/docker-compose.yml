services:
  app:
    image: node:20
    working_dir: /workspaces/NOBEDevOps
    volumes:
      - ..:/workspaces/NOBEDevOps
      - node_modules:/workspaces/NOBEDevOps/node_modules
      - ~/.gemini/antigravity-cli:/root/.gemini/antigravity-cli
    command: sleep infinity
    ports:
      - "3000:3000"

volumes:
  node_modules:

