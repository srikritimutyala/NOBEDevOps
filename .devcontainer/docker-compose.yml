services:
  app:
    image: node:20
    working_dir: /workspaces/NOBEDevOps/nobedevops
    volumes:
      - ..:/workspaces/NOBEDevOps
      - nobedevops_node_modules:/workspaces/NOBEDevOps/nobedevops/node_modules
      - ~/.gemini/antigravity-cli:/root/.gemini/antigravity-cli
    command: sleep infinity
    ports:
      - "3000:3000"

volumes:
  nobedevops_node_modules:
